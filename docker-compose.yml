services:
  web:
    # 预先构建并推送到镜像仓库的镜像（见 scripts/build-push.sh）。
    # 想换成 Docker Hub：把下面这行改成 image: simiely/learning-platform:latest
    # 并在 build-push.sh 里用 Docker Hub 账号 docker login 即可。
    image: ghcr.io/simiely/learning-platform:latest
    container_name: learning-platform
    ports:
      - "2511:8000"
    environment:
      # 局域网部署：DEBUG 打开以便 Django 自动托管 /media/ /static/
      # 公网部署应设为 false 并配合 nginx 反向代理
      - DJANGO_DEBUG=${DJANGO_DEBUG:-true}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env or environment}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      # 媒体素材来源（含顶层 media/ 目录的 tar.gz）
      - MEDIA_SOURCE_URL=https://codeload.github.com/Simiely/learning-platform/tar.gz/refs/heads/master
      # 初始管理员账号（仅首次启动创建）—— 请通过 .env 文件或环境变量设置密码
      - DJANGO_SUPERUSER_USERNAME=${ADMIN_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${ADMIN_PASSWORD:-admin1234}
    volumes:
      # 数据位置（绑定挂载，持久化）：db + media，首次运行由 Docker 自动创建
      - /mnt/usb2/Configs/learning-platform/data/db:/app/db
      - /mnt/usb2/Configs/learning-platform/data/media:/app/media
    restart: unless-stopped
