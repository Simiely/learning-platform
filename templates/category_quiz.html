{% extends 'base.html' %}
{% block title %}练习 - {{ category.name }}{% endblock %}

{% block content %}
<div class="mode-bar">
    <span class="mode-badge">{{ category.name }} 练习</span>
    <div class="mode-tabs">
        <a href="{% url 'category_browse' category.slug %}" class="mode-tab">浏览</a>
        <a href="{% url 'category_cards' category.slug %}" class="mode-tab">卡片</a>
        <a href="{% url 'category_quiz' category.slug %}" class="mode-tab active-mode">练习</a>
    </div>
</div>

{% if error %}
    <p class="empty-hint">{{ error }}</p>
{% else %}
<div class="quiz-page"
     x-data="quizApp('{{ category.slug }}', '{{ csrf_token }}')"
     x-init="nextQuestion()">

    <template x-if="state==='playing'">
        <div class="quiz-body">
            <div class="quiz-progress" x-text="'第 '+(current+1)+' 题 / 共 10 题'"></div>

            <div class="quiz-round">
                <div class="quiz-prompt">图片里是什么？</div>
                <div class="quiz-img" :style="{backgroundColor: currentQuestion.bg_color || '#eef3e4'}">
                    <img :src="currentQuestion.image_url" x-show="currentQuestion.image_url"
                         style="width:100%;height:100%;object-fit:contain;">
                    <span class="qi-emoji" x-show="!currentQuestion.image_url">{{ category.icon }}</span>
                </div>

                <div class="quiz-options">
                    <template x-for="opt in currentQuestion.options" :key="opt.id">
                        <button class="quiz-option"
                                :class="answered?(opt.id===currentQuestion.correct_id?'correct':(selectedId===opt.id?'wrong':'')):''"
                                :style='answered&&opt.id!==currentQuestion.correct_id&&opt.id!==selectedId?{opacity:0.2}:{}'
                                :disabled="answered" @click="selectAnswer(opt.id)">
                            <div style="display:flex;flex-direction:column;align-items:center;line-height:1.3;">
                                <span x-text="opt.name" style="font-size:15px;font-weight:600;"></span>
                                <span x-text="opt.english_name" style="font-size:11px;color:var(--muted);" x-show="opt.english_name"></span>
                            </div>
                        </button>
                    </template>
                </div>

                <div class="quiz-feedback">
                    <div x-show="answered" style="min-height:20px;">
                        <span x-show="isCorrect" class="success">&#127881; 答对了！</span>
                        <span x-show="!isCorrect" class="error">错了，答案是 <span x-text="currentQuestion.correct_name"></span></span>
                    </div>
                    <button class="btn btn-primary btn-sm" x-show="answered" @click="nextQuestion()" style="margin-top:6px;" x-text="current<9?'下一题':'完成'"></button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="state==='done'">
        <div class="quiz-result">
            <div class="big-score" x-text="score+'/10'"></div>
            <div class="score-label">
                <span x-show="score>=8">太棒了！</span>
                <span x-show="score>=5&&score<8">不错，继续加油</span>
                <span x-show="score<5">别灰心，再试试</span>
            </div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <a :href="'/category/'+categorySlug+'/quiz/'" class="btn btn-primary">再做一次</a>
                <a :href="'/category/'+categorySlug+'/'" class="btn btn-outline">返回浏览</a>
            </div>
        </div>
    </template>
</div>

<script>
function quizApp(cat,token){return{categorySlug:cat,state:'playing',current:0,score:0,currentQuestion:null,selectedId:null,answered:false,isCorrect:false,async nextQuestion(){if(this.current>=10){this.state='done';this.submitResult();return}this.selectedId=null;this.answered=false;this.isCorrect=false;const r=await fetch('/api/quiz/'+this.categorySlug+'/question/?type=image_to_name');this.currentQuestion=await r.json()},selectAnswer(id){if(this.answered)return;this.selectedId=id;this.answered=true;this.isCorrect=(id===this.currentQuestion.correct_id);if(this.isCorrect)this.score++;this.current++},async submitResult(){await fetch('/api/quiz/'+this.categorySlug+'/submit/',{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':token},body:JSON.stringify({total:10,correct:this.score,quiz_type:'image_to_name'})})}}}
</script>
<script>
document.querySelector('main.container').classList.add('container-card', 'container-quiz');
</script>
{% endif %}
{% endblock %}
