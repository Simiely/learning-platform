{% extends 'base.html' %}
{% block title %}练习 - {{ category.name }}{% endblock %}

{% block content %}
<div class="mode-bar">
    <span class="mode-badge">练习模式</span>
    <div class="mode-right">
        <div class="mode-tabs">
            <a href="{% url 'category_browse' category.slug %}" class="mode-tab">浏览</a>
            <a href="{% url 'category_cards' category.slug %}" class="mode-tab">卡片</a>
            <a href="{% url 'category_quiz' category.slug %}" class="mode-tab active-mode">练习</a>
        </div>
    </div>
</div>

{% if error %}
    <p class="empty-hint">{{ error }}</p>
{% else %}
<div class="quiz-page"
     x-data="quizApp('{{ category.slug }}', '{{ csrf_token }}')"
     x-init="nextQuestion()">

    <template x-if="state==='playing'">
        <div class="quiz-body">
            <div class="quiz-progress" x-text="'第 '+(Math.min(current,9)+1)+' 题 / 共 10 题'"></div>

            <div class="quiz-round">
                <div class="quiz-prompt">图片里是什么？</div>
                <div class="quiz-img">
                    <img :src="currentQuestion.image_url" x-show="currentQuestion.image_url"
                         style="width:100%;height:100%;object-fit:cover;"
                         :style="{objectPosition: centerPos(currentQuestion.image_position)}">
                    <span class="qi-emoji" x-show="!currentQuestion.image_url">{{ category.icon }}</span>
                </div>

                <div class="quiz-options">
                    <template x-for="opt in currentQuestion.options" :key="opt.id">
                        <button class="quiz-option"
                                :class="answered?(opt.id===currentQuestion.correct_id?'correct':(selectedId===opt.id?'wrong':'')):''"
                                :style='answered&&opt.id!==currentQuestion.correct_id?(opt.id===selectedId?{opacity:0.3}:{opacity:0.1}):{}'
                                :disabled="answered" @click="selectAnswer(opt.id)">
                            <div style="line-height:1.4;">
                                <span x-text="opt.name" style="font-size:17px;font-weight:600;"></span>
                                <span x-text="' / '+opt.english_name" style="font-size:15px;color:var(--muted);" x-show="opt.english_name"></span>
                            </div>
                        </button>
                    </template>
                </div>

                <div class="quiz-feedback">
                    <div style="height:24px;text-align:center;">
                        <span x-show="isCorrect" class="success">&#127881; 答对了！</span>
                        <span x-show="!isCorrect&&answered" class="error">答案是 <span x-text="currentQuestion.correct_name"></span></span>
                    </div>
                    <div style="text-align:center;">
                        <button class="btn btn-primary" @click="nextQuestion()"
                                :disabled="!answered"
                                :style="answered?{marginTop:'4px',width:'160px'}:{marginTop:'4px',width:'160px',opacity:0.3,pointerEvents:'none'}"
                                x-text="current<9?'下一题':'完成'"></button>
                    </div>
                </div>
                <audio id="quiz-audio" preload="none" style="display:none"></audio>
            </div>
        </div>
    </template>

    <template x-if="state==='done'">
        <div class="quiz-result">
            <div class="big-score"><span style="font-size:28px;">对了 </span><span x-text="score"></span><span style="font-size:28px;"> 个</span></div>
            <div class="score-label">
                <span x-show="score==10" style="font-size:28px;">&#127881; 满分！太厉害了！</span>
                <span x-show="score>=6&&score<10" style="font-size:28px;">不错，继续加油</span>
                <span x-show="score==5" style="font-size:28px;">差一点点，再来一次！</span>
                <span x-show="score>=3&&score<=4" style="font-size:28px;">继续努力哦</span>
                <span x-show="score<3" style="font-size:28px;">别灰心，再试试</span>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:auto;padding-top:24px;">
                <a :href="'/category/'+categorySlug+'/quiz/'" class="btn btn-primary" style="width:140px;">再做一次</a>
                <a :href="'/category/'+categorySlug+'/'" class="btn btn-outline" style="width:140px;">返回浏览</a>
            </div>
        </div>
    </template>
</div>

<canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:999;display:none;"></canvas>

<script>
function quizApp(cat, token) {
    return {
        categorySlug: cat,
        state: 'playing',
        current: 0,
        score: 0,
        currentQuestion: null,
        selectedId: null,
        answered: false,
        isCorrect: false,

        async nextQuestion() {
            if (this.current >= 10) {
                this.state = 'done';
                this.submitResult();
                return;
            }
            this.selectedId = null;
            this.answered = false;
            this.isCorrect = false;
            var r = await fetch('/api/quiz/' + this.categorySlug + '/question/?type=image_to_name');
            this.currentQuestion = await r.json();
        },

        selectAnswer(id) {
            if (this.answered) return;
            this.selectedId = id;
            this.answered = true;
            this.isCorrect = (id === this.currentQuestion.correct_id);
            if (this.isCorrect) {
                this.score++;
                launchConfetti();
            } else {
                playWrongSound();
            }
            this.current++;
            // Play correct animal audio: Chinese → 1s → English
            this.playQuizAudio();
        },

        playQuizAudio() {
            var audio = document.getElementById('quiz-audio');
            var q = this.currentQuestion;
            if (!audio || !q) return;
            function play(src) {
                if (!src) return;
                audio.src = src;
                audio.load();
                audio.play().catch(function(e) { console.log('Audio error:', e); });
            }
            if (q.audio_zh) {
                play(q.audio_zh);
                setTimeout(function() { play(q.audio_en); }, 1000);
            }
        },

        async submitResult() {
            await fetch('/api/quiz/' + this.categorySlug + '/submit/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': token
                },
                body: JSON.stringify({
                    total: 10,
                    correct: this.score,
                    quiz_type: 'image_to_name'
                })
            });
        }
    };
}

/* ---- Correct Answer Sound ---- */
function playCorrectSound() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var now = ctx.currentTime;
        [523, 659, 784].forEach(function(freq, i) {
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, now + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + i * 0.12);
            osc.stop(now + i * 0.12 + 0.2);
        });
    } catch(e) {}
}

/* ---- Wrong Answer Sound ---- */
function playWrongSound() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(300, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.6);
    } catch(e) {}
}

/* ---- Confetti Burst ---- */
function launchConfetti() {
    playCorrectSound();
    var c = document.getElementById('confetti-canvas');
    c.style.display = 'block';
    var ctx = c.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    // Cap DPR to 2 for performance on Retina iPads
    if (dpr > 2) dpr = 2;
    c.width = window.innerWidth * dpr;
    c.height = window.innerHeight * dpr;
    c.style.width = window.innerWidth + 'px';
    c.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    var colors = ['#ff9292','#f4a261','#e76f51','#2a9d8f','#e9c46a','#90be6d'];
    var particles = [];
    var cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    var total = 80;
    var img = document.querySelector('.quiz-img');
    var rect = img ? img.getBoundingClientRect() : null;
    var ox = rect ? (rect.left + rect.width / 2) : cx;
    var oy = rect ? rect.bottom : cy * 0.65;
    for (var i = 0; i < total; i++) {
        var angle = Math.random() * Math.PI * 2;
        var speed = 2 + Math.random() * 6;
        var size = 4 + Math.random() * 6;
        particles.push({
            x: ox, y: oy,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: size,
            life: 1
        });
    }
    var frame = 0;
    function draw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.08;
            p.life -= 0.01;
            if (p.life <= 0) continue;
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        frame++;
        if (frame < 120) {
            requestAnimationFrame(draw);
        } else {
            c.style.display = 'none';
        }
    }
    requestAnimationFrame(draw);
}
</script>
<script>
function centerPos(pos) {
    return pos || '50% 50%';
}
</script>
<script>
document.querySelector('main.container').classList.add('container-card', 'container-quiz');
</script>
{% endif %}
{% endblock %}
