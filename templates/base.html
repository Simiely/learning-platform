<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}学习卡片{% endblock %}</title>
    {% load static %}
    <script src="{% static 'js/theme.js' %}"></script>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('theme');
                if (theme === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                } else {
                    // Default to dark (no stored pref or 'dark' or 'auto' → dark)
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {}
        })();
    </script>
    <script defer src="{% static 'js/alpine.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260721aa">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="{% url 'index' %}" class="nav-brand">学习卡片</a>
            <div class="nav-links">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换深色模式" title="切换深色模式">&#127769;</button>
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}">统计</a>
                    <span class="nav-user">{{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="nav-logout">退出</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">登录</a>
                    <a href="{% url 'register' %}">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message message-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleTheme() {
            var root = document.documentElement;
            var current = root.getAttribute('data-theme');
            var next, store;
            if (current === 'dark') {
                next = 'light'; store = 'light';
            } else if (current === 'light') {
                // light → auto (remove attribute, let system decide)
                root.removeAttribute('data-theme');
                try { localStorage.setItem('theme', 'auto'); } catch (e) {}
                updateThemeIcon();
                return;
            } else {
                // auto → dark
                next = 'dark'; store = 'dark';
            }
            root.setAttribute('data-theme', next);
            try { localStorage.setItem('theme', store); } catch (e) {}
            updateThemeIcon();
        }
        function updateThemeIcon() {
            var btn = document.querySelector('.theme-toggle');
            if (!btn) return;
            var theme = document.documentElement.getAttribute('data-theme');
            // dark=&#9728; light=&#127769; auto=&#127763;
            btn.innerHTML = !theme ? '&#127763;' : (theme === 'dark' ? '&#9728;' : '&#127769;');
            btn.title = !theme ? '自动（跟随系统）' : (theme === 'dark' ? '亮色模式' : '自动模式');
        }
        updateThemeIcon();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
