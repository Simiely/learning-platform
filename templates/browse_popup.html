<!-- Browse popup overlay -- shared by all browse pages -->
<div class="popup-mask" id="browse-popup" style="display:none" onclick="closeBrowsePopup(event)">
    <div class="popup-card">
        <button class="popup-close" onclick="closeBrowsePopup()">&#10005;</button>
        <div class="popup-counter" id="popup-counter"></div>
        <div class="popup-img">
            <span class="pi-emoji" id="popup-emoji">{{ category.icon }}</span>
            <img id="popup-img-el" src="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;cursor:zoom-in;" onclick="zoomBrowseImage()">
            <div class="popup-nav-side">
                <button class="nav-btn" type="button" onclick="popupPrev()" title="上一张">&lsaquo;</button>
                <button class="nav-btn" type="button" onclick="popupNext()" title="下一张">&rsaquo;</button>
            </div>
        </div>
        <div class="popup-texts" id="popup-texts">
            <div class="ph-zhen">
                <div class="ph-cell" onclick="playBrowseAudio('zh')">
                    <span class="ph-zh" id="popup-zh"></span>
                    <span class="ph-sound" id="popup-sound-zh">&#128266;</span>
                </div>
                <div class="ph-cell" onclick="playBrowseAudio('en')">
                    <span class="ph-en" id="popup-en"></span>
                    <span class="ph-sound muted" id="popup-sound-en">&#128266;</span>
                </div>
            </div>
            <div class="ph-line" id="popup-fact-row" onclick="playBrowseAudio('fact')" style="display:none">
                <span class="ph-fact" id="popup-fact"></span>
                <span class="ph-sound muted" id="popup-sound-fact">&#128266;</span>
            </div>
        </div>
        <audio id="popup-audio" preload="none" style="display:none"></audio>
    </div>
</div>

<!-- Fullscreen zoom (matches card mode) -->
<div class="img-fs" id="browse-fs-overlay" onclick="closeBrowseZoom(event)">
    <button class="fs-close">&#10005;</button>
    <div class="fs-zoom-wrap" id="browse-fs-zoom-wrap">
        <img class="fs-img-clone" id="browse-fs-img-clone" style="max-width:90vw;max-height:90vh;object-fit:contain;cursor:grab;">
    </div>
    <div class="fs-tip">滚轮/双指缩放 · 点击空白关闭</div>
</div>

<script>
(function() {
    var popupItems = [];
    var popupIndex = 0;

    window.showPopup = function(items, index) {
        popupItems = items;
        popupIndex = index;
        renderPopup();
        var p = document.getElementById('browse-popup');
        p.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        // Auto-play
        setTimeout(function() { playBrowseAudio('zh'); }, 400);
        setTimeout(function() { playBrowseAudio('en'); }, 1400);
    };

    function renderPopup() {
        var data = popupItems[popupIndex];
        if (!data) return;
        document.getElementById('popup-counter').textContent = (popupIndex + 1) + ' / ' + popupItems.length;
        document.getElementById('popup-zh').textContent = data.name || '';
        document.getElementById('popup-en').textContent = data.english_name || '';
        document.getElementById('popup-fact').textContent = data.fact || '';

        var imgEl = document.getElementById('popup-img-el');
        var emojiEl = document.getElementById('popup-emoji');
        if (data.image) {
            imgEl.src = data.image.startsWith('/') ? data.image : '/media/' + data.image;
            imgEl.style.objectFit = 'cover';
            imgEl.style.objectPosition = data.image_position || '50% 50%';
            imgEl.style.display = 'block';
            emojiEl.style.display = 'none';
        } else {
            imgEl.style.display = 'none';
            emojiEl.style.display = 'block';
            emojiEl.textContent = data.emoji || '{{ category.icon }}';
        }

        document.getElementById('popup-fact-row').style.display = data.fact ? 'flex' : 'none';
        document.getElementById('popup-sound-zh').className = 'ph-sound' + (data.audio_zh ? '' : ' muted');
        document.getElementById('popup-sound-en').className = 'ph-sound' + (data.audio_en ? '' : ' muted');
        document.getElementById('popup-sound-fact').className = 'ph-sound' + (data.audio_fact ? '' : ' muted');

        var audio = document.getElementById('popup-audio');
        audio.removeAttribute('src');
    }

    window.popupPrev = function() {
        if (popupItems.length === 0) return;
        popupIndex = popupIndex > 0 ? popupIndex - 1 : popupItems.length - 1;
        renderPopup();
    };
    window.popupNext = function() {
        if (popupItems.length === 0) return;
        popupIndex = popupIndex < popupItems.length - 1 ? popupIndex + 1 : 0;
        renderPopup();
    };

    window.closeBrowsePopup = function(e) {
        if (e && e.type && e.target !== document.getElementById('browse-popup')) return;
        document.getElementById('browse-popup').style.display = 'none';
        document.body.style.overflow = '';
        var audio = document.getElementById('popup-audio');
        audio.pause();
        audio.removeAttribute('src');
    };

    window.playBrowseAudio = function(type) {
        var audio = document.getElementById('popup-audio');
        var data = popupItems[popupIndex];
        if (!audio || !data) return;
        var src = data['audio_' + type];
        if (!src) return;
        audio.src = src.startsWith('/') ? src : '/media/' + src;
        audio.load();
        audio.play().catch(function(e) { console.log('Audio play error:', e); });
    };

    // ---- Image zoom (simplified card-mode zoom) ----
    var zoomScale = 1, zoomBaseX = 0, zoomBaseY = 0;
    var zoomDragging = false, zoomDragStartX, zoomDragStartY, zoomStartBaseX, zoomStartBaseY;

    window.zoomBrowseImage = function() {
        var fs = document.getElementById('browse-fs-overlay');
        var img = document.getElementById('popup-img-el');
        if (img.style.display === 'none') return;
        var clone = document.getElementById('browse-fs-img-clone');
        clone.src = img.src;
        zoomScale = 1; zoomBaseX = 0; zoomBaseY = 0;
        clone.style.transform = 'scale(1) translate(0,0)';
        fs.classList.add('show');
    };

    window.closeBrowseZoom = function(e) {
        var el = e.target;
        if (el === e.currentTarget || el.classList.contains('fs-close') || el.classList.contains('fs-tip') || el.classList.contains('fs-zoom-wrap') || (el.tagName === 'IMG' && zoomScale <= 1 && zoomBaseX === 0 && zoomBaseY === 0)) {
            document.getElementById('browse-fs-overlay').classList.remove('show');
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
        var wrap = document.getElementById('browse-fs-zoom-wrap');
        if (!wrap) return;
        wrap.addEventListener('wheel', function(e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -0.1 : 0.1;
            zoomScale = Math.max(0.5, Math.min(5, zoomScale + delta));
            var clone = document.getElementById('browse-fs-img-clone');
            clone.style.transform = 'scale(' + zoomScale + ') translate(' + zoomBaseX + 'px,' + zoomBaseY + 'px)';
        });
        wrap.addEventListener('mousedown', function(e) {
            if (e.button !== 0 || zoomScale <= 1) return;
            zoomDragging = true;
            zoomDragStartX = e.clientX; zoomDragStartY = e.clientY;
            zoomStartBaseX = zoomBaseX; zoomStartBaseY = zoomBaseY;
            document.getElementById('browse-fs-img-clone').style.cursor = 'grabbing';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!zoomDragging) return;
            zoomBaseX = zoomStartBaseX + (e.clientX - zoomDragStartX);
            zoomBaseY = zoomStartBaseY + (e.clientY - zoomDragStartY);
            document.getElementById('browse-fs-img-clone').style.transform =
                'scale(' + zoomScale + ') translate(' + zoomBaseX + 'px,' + zoomBaseY + 'px)';
        });
        document.addEventListener('mouseup', function() {
            zoomDragging = false;
            document.getElementById('browse-fs-img-clone').style.cursor = 'grab';
        });
        var touchDist = 0;
        wrap.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                var dx = e.touches[0].clientX - e.touches[1].clientX;
                var dy = e.touches[0].clientY - e.touches[1].clientY;
                touchDist = Math.sqrt(dx*dx + dy*dy);
            }
        });
        wrap.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                var dx = e.touches[0].clientX - e.touches[1].clientX;
                var dy = e.touches[0].clientY - e.touches[1].clientY;
                var dist = Math.sqrt(dx*dx + dy*dy);
                var delta = (dist - touchDist) / 200;
                zoomScale = Math.max(0.5, Math.min(5, zoomScale + delta));
                touchDist = dist;
                document.getElementById('browse-fs-img-clone').style.transform =
                    'scale(' + zoomScale + ') translate(' + zoomBaseX + 'px,' + zoomBaseY + 'px)';
            }
        });
    });
})();
</script>
