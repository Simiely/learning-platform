{% extends 'base.html' %}
{% block title %}卡片 - {{ category.name }}{% endblock %}

{% block content %}
<div class="mode-bar">
    <span class="mode-badge">卡片模式</span>
    <div class="mode-tabs">
        <a href="{% url 'category_browse' category.slug %}" class="mode-tab">浏览</a>
        <a href="{% url 'category_cards' category.slug %}" class="mode-tab active-mode">卡片</a>
        <a href="{% url 'category_quiz' category.slug %}" class="mode-tab">练习</a>
    </div>
</div>

{% if items %}
<div class="card-page">
    <div class="card-counter" id="card-counter">1 / {{ total }}</div>
    <div class="card-main">
        <div class="card-img-area">
            <span class="ci-emoji" id="card-emoji">{{ category.icon }}</span>
            <img id="card-img" src="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;cursor:zoom-in;" onclick="zoomCardImage()">
            <div class="card-nav-side">
                <button class="nav-btn" type="button" onclick="cardPrev()" title="上一张">&lsaquo;</button>
                <button class="nav-btn accent" type="button" onclick="cardRandom()" title="随机">&#127922;</button>
                <button class="nav-btn" type="button" onclick="cardNext()" title="下一张">&rsaquo;</button>
            </div>
        </div>
        <div class="card-texts">
            <div class="ph-zhen">
                <div class="ph-cell" onclick="playCardAudio('zh')">
                    <span class="ph-zh" id="card-zh"></span>
                    <span class="ph-sound" id="card-sound-zh">&#128266;</span>
                </div>
                <div class="ph-cell" onclick="playCardAudio('en')">
                    <span class="ph-en" id="card-en"></span>
                    <span class="ph-sound muted" id="card-sound-en">&#128266;</span>
                </div>
            </div>
            <div class="ph-line" id="card-fact-row" onclick="playCardAudio('fact')" style="display:none">
                <span class="ph-fact" id="card-fact"></span>
                <span class="ph-sound muted" id="card-sound-fact">&#128266;</span>
            </div>
        </div>
    </div>

    <audio id="card-audio" preload="none" style="display:none"></audio>
</div>

<div class="img-fs" id="card-fs-overlay" onclick="closeZoom(event)">
    <button class="fs-close">&#10005;</button>
    <div class="fs-zoom-wrap" id="fs-zoom-wrap">
        <img class="fs-img-clone" id="fs-img-clone" style="max-width:90vw;max-height:90vh;object-fit:contain;cursor:grab;transition:transform .15s ease;">
    </div>
    <div class="fs-tip">滚轮/双指手势缩放 · 点击空白关闭</div>
</div>

<script>
(function() {
    window.cardItems = {{ items_json|safe }};
    function centerPos(pos) {
        // Image center detection tends to find the whole-animal centroid,
        // but animal faces are usually in the upper portion.
        // Bias the vertical position upward so faces stay visible in portrait containers.
        if (!pos || pos === '50% 50%') return '50% 40%';
        var parts = pos.split(' ');
        var x = parts[0];
        var yPct = parseInt(parts[1]) || 50;
        // Pull focus point upward by ~30%
        var adjustedY = Math.max(5, Math.round(yPct * 0.65));
        return x + ' ' + adjustedY + '%';
    }
    // Random starting card: pick a random index so kids see variety each visit
    var current = Math.floor(Math.random() * window.cardItems.length);

    function render() {
        var it = window.cardItems[current];
        if (!it) return;
        // Card counter
        document.getElementById('card-counter').textContent = (current + 1) + ' / ' + window.cardItems.length;
        document.getElementById('card-zh').textContent = it.name;
        document.getElementById('card-en').textContent = it.english_name || '';
        document.getElementById('card-fact').textContent = it.fact || '';

        // Image
        var img = document.getElementById('card-img');
        var emoji = document.getElementById('card-emoji');
        if (it.image) {
            img.src = it.image;
            img.style.objectFit = 'cover';
            var pos = centerPos(it.image_position);
            img.style.objectPosition = pos;
            img.style.display = 'block';
            emoji.style.display = 'none';
        } else {
            img.style.display = 'none';
            emoji.style.display = 'block';
            emoji.textContent = it.emoji || '{{ category.icon }}';
            document.querySelector('.card-img-area').style.backgroundColor = '';
        }

        // Fact
        document.getElementById('card-fact-row').style.display = it.fact ? 'flex' : 'none';

        // Sound indicators
        document.getElementById('card-sound-zh').className = 'ph-sound' + (it.audio_zh ? '' : ' muted');
        document.getElementById('card-sound-en').className = 'ph-sound' + (it.audio_en ? '' : ' muted');
        document.getElementById('card-sound-fact').className = 'ph-sound' + (it.audio_fact ? '' : ' muted');

        // Sound
        var audio = document.getElementById('card-audio');
        audio.removeAttribute('src');
        audio.removeAttribute('data-audio-zh');
        if (it.audio_zh) audio.setAttribute('data-audio-zh', it.audio_zh);
    }

    window.cardPrev = function() { current = current > 0 ? current-1 : window.cardItems.length-1; render(); markCardViewed(); };
    window.cardNext = function() { current = current < window.cardItems.length-1 ? current+1 : 0; render(); markCardViewed(); };
    window.cardRandom = function() { current = Math.floor(Math.random()*window.cardItems.length); render(); markCardViewed(); };

    function markCardViewed() {
        var it = window.cardItems[current];
        fetch('/api/mark-viewed/' + it.id + '/', {method:'POST', headers:{'X-CSRFToken':'{{ csrf_token }}'}}).catch(function(){});
    }

    window.playCardAudio = function(type) {
        var audio = document.getElementById('card-audio');
        if (!audio) return;
        var it = window.cardItems[current];
        if (!it) return;
        audio.src = it['audio_' + type];
        audio.load();
        audio.play().catch(function(e) {
            console.log('Audio play error:', e);
        });
    };

    var zoomScale = 1;
    var zoomBaseX = 0, zoomBaseY = 0;
    var zoomDragging = false, zoomDragStartX, zoomDragStartY, zoomStartBaseX, zoomStartBaseY;

    window.zoomCardImage = function() {
        var fs = document.getElementById('card-fs-overlay');
        var img = document.getElementById('card-img');
        if (img.style.display === 'none') return;
        var clone = document.getElementById('fs-img-clone');
        clone.src = img.src;
        zoomScale = 1;
        zoomBaseX = 0;
        zoomBaseY = 0;
        clone.style.transform = 'scale(1) translate(0,0)';
        fs.classList.add('show');
    };
    window.closeZoom = function(e) {
        var el = e.target;
        if (el === e.currentTarget || el.classList.contains('fs-close') || el.classList.contains('fs-tip') || el.classList.contains('fs-zoom-wrap') || (el.tagName === 'IMG' && zoomScale <= 1 && zoomBaseX === 0 && zoomBaseY === 0)) {
            document.getElementById('card-fs-overlay').classList.remove('show');
        }
    }
    document.getElementById('fs-zoom-wrap').addEventListener('wheel', function(e) {
        e.preventDefault();
        var delta = e.deltaY > 0 ? -0.1 : 0.1;
        zoomScale = Math.max(0.5, Math.min(5, zoomScale + delta));
        var clone = document.getElementById('fs-img-clone');
        clone.style.transform = 'scale(' + zoomScale + ') translate(' + zoomBaseX + 'px,' + zoomBaseY + 'px)';
        clone.style.transition = zoomScale === 1 && zoomBaseX === 0 && zoomBaseY === 0 ? 'transform .15s ease' : 'none';
    });
    document.getElementById('fs-zoom-wrap').addEventListener('mousedown', function(e) {
        if (e.button !== 0 || zoomScale <= 1) return;
        zoomDragging = true;
        zoomDragStartX = e.clientX;
        zoomDragStartY = e.clientY;
        zoomStartBaseX = zoomBaseX;
        zoomStartBaseY = zoomBaseY;
        document.getElementById('fs-img-clone').style.cursor = 'grabbing';
        e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
        if (!zoomDragging) return;
        zoomBaseX = zoomStartBaseX + (e.clientX - zoomDragStartX);
        zoomBaseY = zoomStartBaseY + (e.clientY - zoomDragStartY);
        document.getElementById('fs-img-clone').style.transform =
            'scale(' + zoomScale + ') translate(' + zoomBaseX + 'px,' + zoomBaseY + 'px)';
    });
    document.addEventListener('mouseup', function() {
        zoomDragging = false;
        document.getElementById('fs-img-clone').style.cursor = 'grab';
    });
    // Touch pinch support
    var touchDist = 0;
    document.getElementById('fs-zoom-wrap').addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            touchDist = Math.sqrt(dx*dx + dy*dy);
        }
    });
    document.getElementById('fs-zoom-wrap').addEventListener('touchmove', function(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            var dist = Math.sqrt(dx*dx + dy*dy);
            var delta = (dist - touchDist) / 200;
            zoomScale = Math.max(0.5, Math.min(5, zoomScale + delta));
            touchDist = dist;
            document.getElementById('fs-img-clone').style.transform =
                'scale(' + zoomScale + ') translate(' + zoomBaseX + 'px,' + zoomBaseY + 'px)';
        }
    });

    // Initial render
    render();
    markCardViewed();
    autoPlaySequence();

    function autoPlaySequence() {
        setTimeout(function() { playCardAudio('zh'); }, 300);
        setTimeout(function() { playCardAudio('en'); }, 1300);
    }

    // Hook auto-play into nav buttons
    var _cardPrev = window.cardPrev;
    var _cardNext = window.cardNext;
    var _cardRandom = window.cardRandom;
    window.cardPrev = function() { _cardPrev(); autoPlaySequence(); };
    window.cardNext = function() { _cardNext(); autoPlaySequence(); };
    window.cardRandom = function() { _cardRandom(); autoPlaySequence(); };

    // Full-viewport card mode: no scroll
    document.querySelector('main.container').classList.add('container-card');
})();
</script>
{% else %}
<p class="empty-hint">暂无内容。</p>
{% endif %}
{% endblock %}
