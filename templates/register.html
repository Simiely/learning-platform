{% extends 'base.html' %}
{% block title %}注册{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>注册</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <label>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" required>
            <label>密码</label>
            <input type="password" name="password1" placeholder="至少6位" required>
            <label>确认密码</label>
            <input type="password" name="password2" placeholder="再输一次" required>
            <button type="submit" class="btn btn-primary">注册</button>
        </form>
        <p class="auth-switch">已有账号？<a href="{% url 'login' %}">立即登录</a></p>
    </div>
</div>
{% endblock %}
