{% extends 'base.html' %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>登录</h2>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <label for="id_username">用户名</label>
            <input type="text" id="id_username" name="username" placeholder="请输入用户名" required autocomplete="username">
            <label for="id_password">密码</label>
            <input type="password" id="id_password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            <button type="submit" class="btn btn-primary">登录</button>
        </form>
        <p class="auth-switch">还没有账号？<a href="{% url 'register' %}">立即注册</a></p>
    </div>
</div>
{% endblock %}
